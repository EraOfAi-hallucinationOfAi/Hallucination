<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VerifAI | AI Hallucination Detection Platform</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #05070a;
            color: #fff;
            overflow-x: hidden;
        }

        /* Animated Background */
        .bg-gradient {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 30%, rgba(0, 173, 181, 0.15) 0%, transparent 50%),
                        radial-gradient(circle at 80% 70%, rgba(0, 255, 157, 0.1) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 32px 40px;
            position: relative;
            z-index: 1;
        }

        /* Glassmorphism Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 48px;
            flex-wrap: wrap;
            gap: 20px;
            background: rgba(5, 7, 10, 0.6);
            backdrop-filter: blur(20px);
            padding: 20px 32px;
            border-radius: 32px;
            border: 1px solid rgba(0, 173, 181, 0.2);
        }

        .logo h1 {
            font-size: 32px;
            font-weight: 800;
            background: linear-gradient(135deg, #00ADB5 0%, #00FF9D 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
        }

        .logo p {
            font-size: 12px;
            color: #7E8493;
            margin-top: 4px;
        }

        .status-badge {
            display: flex;
            gap: 12px;
        }

        .badge {
            padding: 8px 18px;
            background: rgba(0, 173, 181, 0.1);
            border: 1px solid rgba(0, 173, 181, 0.3);
            border-radius: 100px;
            font-size: 13px;
            font-weight: 500;
            backdrop-filter: blur(10px);
            transition: all 0.3s;
        }

        .badge:hover {
            border-color: #00ADB5;
            transform: translateY(-2px);
        }

        /* Tabs */
        .tabs {
            display: flex;
            gap: 12px;
            margin-bottom: 32px;
            background: rgba(15, 17, 23, 0.6);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 8px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .tab-btn {
            flex: 1;
            background: transparent;
            border: none;
            padding: 14px 28px;
            font-size: 15px;
            font-weight: 600;
            color: #7E8493;
            cursor: pointer;
            border-radius: 14px;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .tab-btn i {
            font-size: 18px;
        }

        .tab-btn.active {
            background: linear-gradient(135deg, #00ADB5 0%, #00FF9D 100%);
            color: #05070a;
            box-shadow: 0 4px 15px rgba(0, 173, 181, 0.3);
        }

        /* Input Card */
        .input-card {
            background: rgba(15, 17, 23, 0.6);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 32px;
            padding: 32px;
            margin-bottom: 32px;
            transition: all 0.3s;
        }

        .input-card:hover {
            border-color: rgba(0, 173, 181, 0.3);
            box-shadow: 0 8px 32px rgba(0, 173, 181, 0.1);
        }

        .input-label {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 12px;
            color: #00ADB5;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .url-input, textarea {
            width: 100%;
            background: #1A1D24;
            border: 1px solid #2A2F3A;
            border-radius: 20px;
            padding: 18px;
            color: #E8EDFF;
            font-family: 'Inter', monospace;
            font-size: 14px;
            transition: all 0.3s;
        }

        .url-input:focus, textarea:focus {
            outline: none;
            border-color: #00ADB5;
            box-shadow: 0 0 0 3px rgba(0, 173, 181, 0.2);
        }

        textarea {
            min-height: 180px;
            resize: vertical;
        }

        .analyze-btn {
            background: linear-gradient(135deg, #00ADB5 0%, #00FF9D 100%);
            border: none;
            padding: 16px 32px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 16px;
            color: #05070a;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 24px;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            position: relative;
            overflow: hidden;
        }

        .analyze-btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .analyze-btn:hover::before {
            width: 300px;
            height: 300px;
        }

        .analyze-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 32px rgba(0, 173, 181, 0.4);
        }

        /* Loading Animation */
        .loading {
            display: none;
            text-align: center;
            padding: 60px;
            background: rgba(15, 17, 23, 0.6);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            margin-bottom: 32px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .spinner {
            width: 60px;
            height: 60px;
            border: 3px solid rgba(0, 173, 181, 0.2);
            border-top-color: #00ADB5;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            font-size: 14px;
            color: #7E8493;
            letter-spacing: 1px;
        }

        /* Results Section */
        .results {
            display: none;
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 24px;
            margin-bottom: 32px;
        }

        .stat-card {
            background: rgba(15, 17, 23, 0.6);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 28px;
            padding: 28px 20px;
            text-align: center;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, #00ADB5, #00FF9D);
        }

        .stat-card:hover {
            transform: translateY(-5px);
            border-color: rgba(0, 173, 181, 0.3);
        }

        .stat-icon {
            font-size: 32px;
            margin-bottom: 12px;
        }

        .stat-label {
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #7E8493;
            margin-bottom: 12px;
        }

        .stat-value {
            font-size: 48px;
            font-weight: 800;
            background: linear-gradient(135deg, #00ADB5, #00FF9D);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        /* Assessment Card */
        .assessment-card {
            background: linear-gradient(135deg, rgba(0, 173, 181, 0.1) 0%, rgba(0, 255, 157, 0.05) 100%);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 173, 181, 0.3);
            border-radius: 28px;
            padding: 28px;
            margin-bottom: 32px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .assessment-card::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(0, 173, 181, 0.1) 0%, transparent 70%);
            animation: pulse 4s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.5; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.1); }
        }

        .assessment-text {
            position: relative;
            z-index: 1;
            font-size: 18px;
            font-weight: 500;
            line-height: 1.6;
        }

        /* Progress Bar */
        .progress-container {
            background: rgba(42, 47, 58, 0.6);
            border-radius: 20px;
            padding: 4px;
            margin: 32px 0;
        }

        .progress-bar {
            background: linear-gradient(90deg, #FF4D4D, #FF0000);
            border-radius: 16px;
            height: 12px;
            transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .progress-bar::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            animation: shimmer 2s infinite;
        }

        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        /* Claim Cards */
        .claim-card {
            background: rgba(15, 17, 23, 0.6);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 28px;
            padding: 28px;
            margin-bottom: 24px;
            border-left: 4px solid;
            transition: all 0.3s;
        }

        .claim-card:hover {
            transform: translateX(8px);
            border-color: #00ADB5;
        }

        .claim-card.hallucination {
            border-left-color: #FF4D4D;
        }

        .claim-card.trustworthy {
            border-left-color: #00FF9D;
        }

        .claim-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: 20px;
        }

        .claim-text {
            font-size: 16px;
            font-weight: 500;
            line-height: 1.5;
            flex: 1;
        }

        .claim-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 16px;
            border-radius: 40px;
            font-size: 12px;
            font-weight: 700;
        }

        .badge-hall {
            background: rgba(255, 77, 77, 0.2);
            color: #FF4D4D;
            border: 1px solid rgba(255, 77, 77, 0.3);
        }

        .badge-trust {
            background: rgba(0, 255, 157, 0.2);
            color: #00FF9D;
            border: 1px solid rgba(0, 255, 157, 0.3);
        }

        .confidence-bar {
            background: #2A2F3A;
            border-radius: 10px;
            height: 6px;
            overflow: hidden;
            margin: 16px 0;
        }

        .confidence-fill {
            height: 100%;
            transition: width 0.5s;
            border-radius: 10px;
        }

        .confidence-fill.hall {
            background: linear-gradient(90deg, #FF4D4D, #FF0000);
        }

        .confidence-fill.trust {
            background: linear-gradient(90deg, #00ADB5, #00FF9D);
        }

        .evidence-box {
            background: rgba(26, 29, 36, 0.6);
            border-radius: 20px;
            padding: 20px;
            margin-top: 20px;
        }

        .correct-answer {
            color: #00FF9D;
            margin-bottom: 12px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .source-link {
            color: #00ADB5;
            text-decoration: none;
            font-size: 12px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-top: 12px;
            transition: all 0.3s;
        }

        .source-link:hover {
            color: #00FF9D;
            transform: translateX(4px);
        }

        /* Tab Content */
        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Responsive */
        @media (max-width: 1024px) {
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 768px) {
            .container {
                padding: 20px;
            }
            .stats-grid {
                grid-template-columns: 1fr;
            }
            .stat-value {
                font-size: 36px;
            }
            .header {
                flex-direction: column;
                text-align: center;
            }
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #1A1D24;
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb {
            background: linear-gradient(135deg, #00ADB5, #00FF9D);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #00ADB5;
        }
    </style>
</head>
<body>
<div class="bg-gradient"></div>
<div class="particles" id="particles"></div>

<div class="container">
    <div class="header">
        <div class="logo">
            <h1><i class="fas fa-brain"></i> VerifAI</h1>
            <p>Enterprise AI Hallucination Detection Platform</p>
        </div>
        <div class="status-badge">
            <span class="badge"><i class="fas fa-bolt"></i> Real-time</span>
            <span class="badge"><i class="fas fa-database"></i> RAG Powered</span>
            <span class="badge"><i class="fas fa-chart-line"></i> Semantic Analysis</span>
        </div>
    </div>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('url')">
            <i class="fas fa-link"></i> Paste Chat Link
        </button>
        <button class="tab-btn" onclick="switchTab('text')">
            <i class="fas fa-file-alt"></i> Paste AI Text
        </button>
    </div>

    <div id="urlTab" class="tab-content active">
        <div class="input-card">
            <div class="input-label">
                <i class="fas fa-globe"></i> ChatGPT / Claude / Perplexity / DeepSeek Link
            </div>
            <input type="text" class="url-input" id="urlInput" placeholder="https://chat.openai.com/share/... or https://claude.ai/share/...">
            <button class="analyze-btn" id="analyzeUrlBtn">
                <i class="fas fa-microscope"></i> Extract & Analyze
            </button>
        </div>
    </div>

    <div id="textTab" class="tab-content">
        <div class="input-card">
            <div class="input-label">
                <i class="fas fa-quote-right"></i> AI Response Text
            </div>
            <textarea id="textInput" placeholder="Paste AI response here..."></textarea>
            <button class="analyze-btn" id="analyzeTextBtn">
                <i class="fas fa-search"></i> Analyze Hallucinations
            </button>
        </div>
    </div>

    <div class="loading" id="loading">
        <div class="spinner"></div>
        <div class="loading-text" id="loadingText">Initializing AI analysis...</div>
    </div>

    <div id="results" class="results"></div>
</div>

<script>
let currentChart = null;

function switchTab(tab) {
    document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
    event.target.classList.add('active');

    document.getElementById('urlTab').classList.remove('active');
    document.getElementById('textTab').classList.remove('active');

    if (tab === 'url') {
        document.getElementById('urlTab').classList.add('active');
    } else {
        document.getElementById('textTab').classList.add('active');
    }

    document.getElementById('results').style.display = 'none';
}

async function analyzeUrl() {

    const url = document.getElementById('urlInput').value.trim();

    if (!url) {
        alert("Please paste a chat link");
        return;
    }

    await performAnalysis({
        text: url   // 🔥 important fix
    }, "🌐 Opening chat link and extracting AI responses...");
}

async function analyzeText() {

    const text = document.getElementById('textInput').value.trim();

    if (!text) {
        alert("Please paste AI response text");
        return;
    }

    await performAnalysis({
        text: text
    }, "🔍 Detecting hallucinations...");
}

async function performAnalysis(data, loadingMsg) {

    const loading = document.getElementById("loading");
    const loadingText = document.getElementById("loadingText");
    const resultsDiv = document.getElementById("results");

    loadingText.innerHTML = loadingMsg;

    loading.style.display = "block";
    resultsDiv.style.display = "none";

    try {

        const response = await fetch("/api/analyze", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(data)
        });

        const result = await response.json();

        if (!result.success) {

            resultsDiv.innerHTML = `
                <div class="assessment-card">
                    <div class="assessment-text">
                        ⚠ ${result.error}
                        <br><br>
                        💡 ${result.tip || "Try pasting AI text or a chat link"}
                    </div>
                </div>
            `;

            resultsDiv.style.display = "block";
            return;
        }

        displayResults(result.analysis);

    } catch (error) {

        resultsDiv.innerHTML = `
            <div class="assessment-card">
                <div class="assessment-text">
                    ❌ Connection error
                    <br><br>
                    ${error.message}
                    <br><br>
                    Make sure Flask server is running on port 5000
                </div>
            </div>
        `;

        resultsDiv.style.display = "block";
    }

    loading.style.display = "none";
}

function displayResults(analysis) {

    let html = `

    <div class="stats-grid">

        <div class="stat-card">
            <div class="stat-icon"><i class="fas fa-exclamation-triangle"></i></div>
            <div class="stat-label">Hallucination Rate</div>
            <div class="stat-value">${analysis.hallucination_rate}%</div>
        </div>

        <div class="stat-card">
            <div class="stat-icon"><i class="fas fa-check-circle"></i></div>
            <div class="stat-label">Trust Rate</div>
            <div class="stat-value">${analysis.trust_rate}%</div>
        </div>

        <div class="stat-card">
            <div class="stat-icon"><i class="fas fa-file-alt"></i></div>
            <div class="stat-label">Claims</div>
            <div class="stat-value">${analysis.total_claims}</div>
        </div>

        <div class="stat-card">
            <div class="stat-icon"><i class="fas fa-clock"></i></div>
            <div class="stat-label">Processing Time</div>
            <div class="stat-value">${analysis.processing_time}s</div>
        </div>

    </div>
    `;

    analysis.results.forEach((r, i) => {

        const isHall = r.is_hallucination;
        const score = isHall ? r.hallucination_score : r.trust_score;

        html += `
        <div class="claim-card ${isHall ? "hallucination" : "trustworthy"}">

            <div class="claim-header">

                <div class="claim-text">
                    <strong>#${i + 1}</strong> ${escapeHtml(r.claim)}
                </div>

                <div class="claim-badge ${isHall ? "badge-hall" : "badge-trust"}">
                    ${score}% ${isHall ? "HALLUCINATION" : "TRUST"}
                </div>

            </div>

            <div class="confidence-bar">
                <div class="confidence-fill ${isHall ? "hall" : "trust"}" style="width:${score}%"></div>
            </div>

            <div class="evidence-box">

                <div class="correct-answer">
                    ✔ Evidence
                </div>

                ${escapeHtml(r.correct_answer)}

                ${r.source_url ? `
                <a href="${r.source_url}" target="_blank" class="source-link">
                🔗 ${escapeHtml(r.source_title)}
                </a>
                ` : ""}

            </div>

        </div>
        `;
    });

    document.getElementById("results").innerHTML = html;
    document.getElementById("results").style.display = "block";
}

function escapeHtml(text) {
    if (!text) return "";
    return text.replace(/[&<>]/g, function (m) {
        if (m === "&") return "&amp;";
        if (m === "<") return "&lt;";
        if (m === ">") return "&gt;";
        return m;
    });
}

document.getElementById("analyzeUrlBtn").addEventListener("click", analyzeUrl);
document.getElementById("analyzeTextBtn").addEventListener("click", analyzeText);
</script>
</body>
</html>
